  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { overflow: hidden; height: 100%; }

    /* Globe popup overlay */
    #globe-popup {
      position: fixed;
      z-index: 1000;
      background: #161613;
      border: 1px solid #2e2e28;
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      pointer-events: auto;
    }
    #globe-popup .popup-close-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: none; border: none;
      color: #7a7060; font-size: 18px;
      cursor: pointer; line-height: 1;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    #globe-popup .popup-close-btn:hover { color: #e8dcc8; }

    /* Zoom controls */
    .globe-zoom {
      position: fixed;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .globe-zoom-btn {
      width: 36px; height: 36px;
      background: rgba(13,13,10,0.94);
      border: 1px solid var(--border-light, #2a2a22);
      border-radius: 6px;
      color: #a09880;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, background 0.12s;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: 'Inter', sans-serif;
    }
    .globe-zoom-btn:hover { color: #e8dcc8; background: rgba(30,30,24,0.97); }
    .globe-zoom-reset { font-size: 1rem; margin-top: 0.35rem; }

    /* ── Layer panel (replaces old year-panel) ──────────────── */
    .layer-panel {
      position: fixed;
      top: calc(var(--nav-h) + 46px + 1.25rem);
      right: 1.25rem;
      z-index: 500;
      background: rgba(13,13,10,0.94);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 0.6rem 0;
      min-width: 168px;
      max-height: calc(100vh - var(--nav-h) - 46px - 2.5rem);
      overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .layer-panel::-webkit-scrollbar { width: 3px; }
    .layer-panel::-webkit-scrollbar-track { background: transparent; }
    .layer-panel::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    .layer-panel-section {
      padding: 0 0 0.35rem;
    }
    .layer-panel-section + .layer-panel-section {
      border-top: 1px solid var(--border);
      padding-top: 0.35rem;
    }
    .layer-panel-label {
      font-size: 0.58rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-align: center;
      padding: 0.25rem 0.75rem 0.4rem;
      font-weight: 600;
    }

    /* Year buttons inside layer panel */
    .layer-panel .year-btn {
      display: block;
      width: 100%;
      padding: 0.42rem 0.75rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: color 0.12s, background 0.12s;
    }
    .layer-panel .year-btn:hover { color: var(--text); background: var(--bg-elevated); }
    .layer-panel .year-btn.active { color: var(--accent); font-weight: 700; }

    /* Layer toggles */
    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
    }
    .layer-toggle:hover { background: var(--bg-elevated); }

    .layer-toggle input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--border-light);
      border-radius: 3px;
      background: var(--bg-elevated);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .layer-toggle input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .layer-toggle input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -1.5px;
      left: 1px;
      font-size: 10px;
      color: #fff;
      font-weight: 700;
    }

    .layer-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .layer-swatch {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .layer-swatch.energy     { background: #f4a942; }
    .layer-swatch.goods      { background: #5b9fb5; }
    .layer-swatch.chokepoint {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid #e07070;
    }
    .layer-swatch.population {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, #d4a56a 30%, transparent 70%);
    }
    .layer-swatch.conflicts  {
      width: 10px; height: 10px;
      border-radius: 2px;
      background: #e05555;
    }

    /* Disabled / coming-soon toggles */
    .layer-toggle.disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }
    .layer-toggle .coming-soon {
      font-size: 0.58rem;
      color: var(--text-dim);
      font-style: italic;
      margin-left: auto;
      letter-spacing: 0.02em;
    }

    /* Chokepoint popup */
    .choke-popup-inner {
      font-family: 'Inter', sans-serif;
      padding: 1rem 1.15rem;
      min-width: 200px;
      max-width: 280px;
    }
    .choke-popup-tier {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .choke-popup-tier.tier-1 { color: var(--failed); }
    .choke-popup-tier.tier-2 { color: var(--pending); }
    .choke-popup-tier.tier-3 { color: #5b9fb5; }
    .choke-popup-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #e8dcc8;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .choke-popup-status {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .choke-popup-detail {
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* Mobile layer toggle button — only visible on small screens */
    .layer-panel-toggle {
      display: none;
      position: fixed;
      top: calc(var(--nav-h) + 46px + 0.75rem);
      right: 0.75rem;
      z-index: 501;
      width: 42px;
      height: 42px;
      background: rgba(13,13,10,0.94);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: color 0.15s, background 0.15s;
    }
    .layer-panel-toggle:hover { color: var(--text); background: rgba(30,30,24,0.97); }
    .layer-panel-toggle.active {
      color: var(--accent);
      border-color: rgba(78, 139, 100, 0.4);
    }

    /* Mobile */
    @media (max-width: 600px) {
      .layer-panel-toggle { display: flex; }
      .layer-panel {
        min-width: 160px;
        max-height: calc(100vh - var(--nav-h) - 46px - 2.5rem);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        /* Hidden by default on mobile */
        transform: translateX(calc(100% + 2rem));
        opacity: 0;
        pointer-events: none;
        transition: transform 0.25s ease, opacity 0.2s ease;
      }
      .layer-panel.mobile-open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }
      /* Subtle scrollbar */
      .layer-panel::-webkit-scrollbar { width: 3px; }
      .layer-panel::-webkit-scrollbar-track { background: transparent; }
      .layer-panel::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
      .layer-panel .year-btn { min-height: 44px; font-size: 0.88rem; }
      .layer-toggle { padding: 0.5rem 0.75rem; min-height: 44px; }
      .layer-toggle input[type="checkbox"] { width: 18px; height: 18px; }
      .layer-toggle input[type="checkbox"]:checked::after { top: 0px; left: 2.5px; font-size: 12px; }
      .globe-zoom-btn { width: 44px; height: 44px; font-size: 1.3rem; }
    }

    /* Landscape phones — panel gets even less room */
    @media (max-height: 500px) {
      .layer-panel {
        max-height: calc(100vh - var(--nav-h) - 46px - 1rem);
        font-size: 0.8rem;
      }
      .layer-panel .year-btn { min-height: 36px; padding: 0.3rem 0.75rem; }
      .layer-toggle { min-height: 36px; padding: 0.35rem 0.75rem; }
    }
  </style>

  <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <script>
    // ── Hamburger menu ───────────────────────────────────────────
    (function() {
      const btn = document.querySelector('.nav-hamburger');
      const nav = document.querySelector('.nav-links');
      if (!btn || !nav) return;
      btn.addEventListener('click', () => {
        const open = nav.classList.toggle('open');
        btn.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open);
      });
      nav.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          nav.classList.remove('open');
          btn.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        });
      });
    })();

    // ── Helpers ────────────────────────────────────────────────
    const COLORS = {
      success: '#52b788',
      failed:  '#e07070',
      pending: '#f4a942'
    };

    const SHIPPING_COLORS = {
      energy: '#f4a942',
      goods:  '#5b9fb5'
    };

    const TIER_COLORS = {
      1: '#e07070',
      2: '#f4a942',
      3: '#5b9fb5'
    };

    const isTouch = window.matchMedia('(pointer: coarse)').matches;
    const touchScale = isTouch ? 1.7 : 1.0;

    function pointColor(d) {
      return d.weight === 0 ? '#888888' : (COLORS[d.outcome] || '#888888');
    }

    function pointRadius(d) {
      const base = d.weight === 2 ? 0.75 : d.weight === 1 ? 0.58 : 0.38;
      return base * touchScale;
    }

    function pointAltitude(d) {
      return d.weight === 2 ? 0.04 : d.weight === 1 ? 0.025 : 0.005;
    }

    // ── Popup HTML (calls) ─────────────────────────────────────
    function popupHTML(c) {
      const outcomeLabel = { success: '✓ Correct', failed: '✗ Missed', pending: '⏳ Pending' };
      const weightLabel  = c.weight === 2 ? '★★ Important' :
                           c.weight === 1 ? '★ Normal' :
                           c.weight === 0 ? '— Passive' : null;
      const dateStr = new Date(c.date).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });

      return `<div class="popup-inner">
        <div class="popup-year">${c.year} · ${c.region}</div>
        <div class="popup-title">${c.title}</div>
        <span class="popup-status ${c.outcome}">${outcomeLabel[c.outcome] || c.outcome}</span>
        <div class="popup-desc">${c.description}</div>
        <div class="popup-footer">
          ${c.article_url && c.article_url !== '#'
            ? `<a class="popup-link" href="${c.article_url}" target="_blank" rel="noopener">Read article ↗</a>`
            : `<span class="popup-link" style="color:#4a4535">${c.article_title || ''}</span>`}
          ${weightLabel
            ? `<span class="popup-weight-tag">${weightLabel}</span>`
            : `<span class="popup-weight-tag">${dateStr}</span>`}
        </div>
      </div>`;
    }

    // ── Popup HTML (chokepoints) ───────────────────────────────
    function chokePopupHTML(cp) {
      const tierLabel = { 1: 'Tier 1 — Acute risk', 2: 'Tier 2 — Systemic risk', 3: 'Tier 3 — Regional' };
      return `<div class="choke-popup-inner">
        <div class="choke-popup-tier tier-${cp.tier}">${tierLabel[cp.tier]}</div>
        <div class="choke-popup-name">${cp.name}</div>
        <div class="choke-popup-status">${cp.status}</div>
        <div class="choke-popup-detail">${cp.detail}</div>
      </div>`;
    }

    // ── Popup show/hide ────────────────────────────────────────
    function showPopup(html, event) {
      const el = document.getElementById('globe-popup');
      el.innerHTML = `<button class="popup-close-btn" id="popup-close-btn">×</button>` + html;

      if (window.innerWidth <= 600) {
        el.style.left    = '1rem';
        el.style.right   = '1rem';
        el.style.bottom  = '1rem';
        el.style.top     = 'auto';
        el.style.width   = 'auto';
        el.style.maxHeight = '55vh';
        el.style.overflowY = 'auto';
      } else {
        const pw = 360, ph = 300;
        let x = event.clientX + 18;
        let y = event.clientY - 30;
        if (x + pw > window.innerWidth - 10)  x = event.clientX - pw - 18;
        if (x < 10) x = 10;
        if (y + ph > window.innerHeight - 10) y = window.innerHeight - ph - 10;
        if (y < 10) y = 10;
        el.style.left    = x + 'px';
        el.style.top     = y + 'px';
        el.style.right   = '';
        el.style.bottom  = '';
        el.style.width   = '';
        el.style.maxHeight = '';
        el.style.overflowY = '';
      }

      el.style.display = 'block';
      document.getElementById('popup-close-btn').addEventListener('click', hidePopup);
    }

    function hidePopup() {
      document.getElementById('globe-popup').style.display = 'none';
    }

    // ── Globe init ─────────────────────────────────────────────
    const mapEl = document.getElementById('map');

    const globe = Globe()
      .backgroundColor('#0a0a08')
      .showAtmosphere(true)
      .atmosphereColor('#4E8B64')
      .atmosphereAltitude(0.18)
      .polygonCapColor(() => '#141410')
      .polygonSideColor(() => '#1a2a1a')
      .polygonStrokeColor(() => '#2e3e2e')
      .polygonAltitude(0.005)
      // ── Call points ──
      .pointColor(pointColor)
      .pointRadius(pointRadius)
      .pointAltitude(pointAltitude)
      .pointsMerge(false)
      .onPointClick((point, event) => showPopup(popupHTML(point), event))
      // ── Shipping paths ──
      .pathsData([])
      .pathPoints('coords')
      .pathPointLat(p => p[0])
      .pathPointLng(p => p[1])
      .pathColor(d => d._color)
      .pathStroke(d => d._stroke)
      .pathDashLength(0.008)
      .pathDashGap(0.004)
      .pathDashAnimateTime(d => 80000 / (d._speed || 1))
      .pathTransitionDuration(300)
      // ── Chokepoint rings ──
      .ringColor(d => t => `rgba(${d._rgb}, ${1 - t})`)
      .ringMaxRadius(d => d._maxR)
      .ringPropagationSpeed(d => d._speed)
      .ringRepeatPeriod(d => d._period)
      .ringAltitude(0.005)
      // ── General ──
      .onGlobeClick(hidePopup)
      (mapEl);

    globe.width(mapEl.clientWidth).height(mapEl.clientHeight);

    // ── Auto-rotation ──────────────────────────────────────────
    const controls = globe.controls();
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    let rotateTimer;
    controls.addEventListener('start', () => {
      clearTimeout(rotateTimer);
      controls.autoRotate = false;
    });
    controls.addEventListener('end', () => {
      rotateTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
    });

    window.addEventListener('resize', () => {
      globe.width(mapEl.clientWidth).height(mapEl.clientHeight);
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') hidePopup(); });

    // ── Data state ─────────────────────────────────────────────
    let allCalls = [];
    let shippingData = { routes: [], chokepoints: [] };
    let activeYear = 'all';
    let layerState = { energy: false, goods: false, chokepoints: false };

    // ── Pre-process shipping data ──────────────────────────────
    function processShippingData(data) {
      // Build path objects
      data.routes.forEach(r => {
        const tonnageScale = r.tonnage / 10;
        r._color = SHIPPING_COLORS[r.type];
        r._stroke = 0.4 + tonnageScale * 2.0;
        r._speed = 0.5 + tonnageScale * 0.8;
        r.coords = r.path;
      });

      // Build ring objects
      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return `${r},${g},${b}`;
      }

      data.chokepoints.forEach(cp => {
        const color = TIER_COLORS[cp.tier];
        cp._rgb    = hexToRgb(color);
        cp._maxR   = cp.tier === 1 ? 4 : cp.tier === 2 ? 3 : 2;
        cp._speed  = cp.tier === 1 ? 3 : cp.tier === 2 ? 2 : 1.2;
        cp._period = cp.tier === 1 ? 800 : cp.tier === 2 ? 1200 : 1800;
      });

      return data;
    }

    // ── Refresh visible layers ─────────────────────────────────
    function refreshLayers() {
      // Paths: combine energy + goods based on toggle state
      const visiblePaths = shippingData.routes.filter(r =>
        (r.type === 'energy' && layerState.energy) ||
        (r.type === 'goods'  && layerState.goods)
      );
      globe.pathsData(visiblePaths);

      // Rings
      globe.ringsData(layerState.chokepoints ? shippingData.chokepoints : []);
    }

    // ── Load everything ────────────────────────────────────────
    Promise.all([
      fetch('https://unpkg.com/world-atlas@2/countries-110m.json').then(r => r.json()),
      fetch('data/calls.json').then(r => r.json()),
      fetch('data/shipping.json').then(r => r.json()).catch(() => ({ routes: [], chokepoints: [] }))
    ]).then(([worldData, callsData, shipData]) => {
      const countries = topojson.feature(worldData, worldData.objects.countries);
      globe.polygonsData(countries.features);

      allCalls = callsData.calls.filter(c => !c._placeholder);
      globe.pointsData(allCalls);
      updateCount(allCalls);

      shippingData = processShippingData(shipData);
      refreshLayers();
    });

    // ── Year filter ────────────────────────────────────────────
    function filterCalls(year) {
      hidePopup();
      const filtered = year === 'all'
        ? allCalls
        : allCalls.filter(c => c.year === parseInt(year));
      globe.pointsData(filtered);
      updateCount(filtered);
    }

    function updateCount(calls) {
      const success = calls.filter(c => c.outcome === 'success').length;
      const failed  = calls.filter(c => c.outcome === 'failed').length;
      const pending = calls.filter(c => c.outcome === 'pending').length;
      const total   = calls.length;
      document.getElementById('map-count').innerHTML =
        `<span class="stat-value stat-total">${total}</span> call${total !== 1 ? 's' : ''}` +
        `<span class="stat-sep">·</span>` +
        `<span class="stat-value stat-correct">${success}</span> correct` +
        `<span class="stat-sep">·</span>` +
        `<span class="stat-value stat-missed">${failed}</span> missed` +
        `<span class="stat-sep">·</span>` +
        `<span class="stat-value stat-pending">${pending}</span> pending`;
    }

    document.querySelectorAll('.year-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeYear = btn.dataset.year;
        filterCalls(activeYear);
      });
    });

    // ── Layer toggles ──────────────────────────────────────────
    ['energy', 'goods', 'chokepoints'].forEach(layer => {
      const cb = document.getElementById(`layer-${layer}`);
      cb.addEventListener('change', () => {
        layerState[layer] = cb.checked;
        refreshLayers();
      });
    });

    // ── Mobile layer panel toggle ───────────────────────────────
    (function() {
      const toggleBtn = document.getElementById('layer-toggle');
      const panel = document.querySelector('.layer-panel');
      if (!toggleBtn || !panel) return;

      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = panel.classList.toggle('mobile-open');
        toggleBtn.classList.toggle('active', isOpen);
      });

      // Close panel when tapping the globe on mobile
      document.getElementById('map').addEventListener('click', () => {
        if (window.innerWidth <= 600) {
          panel.classList.remove('mobile-open');
          toggleBtn.classList.remove('active');
        }
      });
    })();

    // ── Zoom controls ──────────────────────────────────────────
    const DEFAULT_ALTITUDE = 2.5;
    const MIN_ALTITUDE     = 0.5;
    const MAX_ALTITUDE     = 6.0;

    function getAltitude() {
      return globe.pointOfView().altitude;
    }

    document.getElementById('zoom-in').addEventListener('click', () => {
      const alt = Math.max(MIN_ALTITUDE, getAltitude() * 0.65);
      globe.pointOfView({ altitude: alt }, 400);
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
      const alt = Math.min(MAX_ALTITUDE, getAltitude() * 1.5);
      globe.pointOfView({ altitude: alt }, 400);
    });

    document.getElementById('zoom-reset').addEventListener('click', () => {
      globe.pointOfView({ lat: 20, lng: 10, altitude: DEFAULT_ALTITUDE }, 700);
    });
  </script>
  </main>
</body>
</html>
